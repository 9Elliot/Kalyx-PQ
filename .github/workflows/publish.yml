# Publish kalyxpq to PyPI when a GitHub Release is published.
# Configure PyPI "Trusted Publisher" (OIDC) for this repo; do not use long-lived API tokens.

name: Publish to PyPI

on:
  release:
    types: [published]

# Opt into Node.js 24 for JS-based actions (GitHub deprecation of Node 20 on runners).
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      # Never upload stale wheels/sdists from a previous local or CI run.
      - name: Remove old build artifacts
        run: rm -rf dist build src/kalyxpq.egg-info kalyxpq.egg-info .eggs

      # Pin the version to the Git tag for this release so setuptools-scm does not emit
      # a +local segment (PyPI rejects '+') or a dev suffix from non-tag SHAs.
      - name: Set release version for setuptools-scm
        id: release_version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Building as version: ${VERSION} (from tag ${TAG})"

      - name: Build package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.release_version.outputs.version }}
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kalyxpq
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

      - name: Check distributions (metadata PyPI will accept)
        run: python -m pip install "twine>=6.1" && twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
